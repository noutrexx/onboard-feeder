<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0a07"/><stop offset="1" stop-color="#070910"/>
    </linearGradient>
    <radialGradient id="g1" cx="15%" cy="0%" r="60%">
      <stop offset="0" stop-color="#ffa500" stop-opacity="0.20"/><stop offset="1" stop-color="#ffa500" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="88%" cy="10%" r="58%">
      <stop offset="0" stop-color="#3776ab" stop-opacity="0.30"/><stop offset="1" stop-color="#3776ab" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffe1b3"/><stop offset="0.5" stop-color="#ffa500"/><stop offset="1" stop-color="#5aa0e0"/>
    </linearGradient>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#221708"/><stop offset="1" stop-color="#0a1320"/>
    </linearGradient>
    <linearGradient id="pipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffa500"/><stop offset="1" stop-color="#3776ab"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#g1)"/>
  <rect width="1200" height="320" fill="url(#g2)"/>
  <g stroke="#ffffff" stroke-width="1" opacity="0.04">
    <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="300" y1="0" x2="300" y2="320"/><line x1="600" y1="0" x2="600" y2="320"/><line x1="900" y1="0" x2="900" y2="320"/>
  </g>

  <!-- Pipeline motif: sources -> collector -> API -->
  <g font-family="JetBrains Mono, monospace" font-size="11">
    <!-- RSS waves icon -->
    <g transform="translate(700,120)" stroke="#ffa500" stroke-width="2.4" fill="none">
      <path d="M0 26 a26 26 0 0 1 26 26"/><path d="M0 14 a38 38 0 0 1 38 38"/>
      <circle cx="3" cy="49" r="4" fill="#ffa500" stroke="none"/>
    </g>
    <!-- nodes -->
    <line x1="770" y1="150" x2="900" y2="150" stroke="url(#pipe)" stroke-width="2.5" opacity="0.6"/>
    <line x1="952" y1="150" x2="1080" y2="150" stroke="url(#pipe)" stroke-width="2.5" opacity="0.6"/>
    <rect x="900" y="128" width="52" height="44" fill="none" stroke="#5aa0e0" opacity="0.7"/>
    <text x="926" y="154" fill="#9ad8ff" text-anchor="middle">DB</text>
    <rect x="1080" y="120" width="64" height="60" fill="none" stroke="#3776ab" opacity="0.8"/>
    <text x="1112" y="146" fill="#9ad8ff" text-anchor="middle">API</text>
    <text x="1112" y="162" fill="#5aa0e0" text-anchor="middle">/feeds</text>
    <!-- feed item cards -->
    <g fill="#ffa500" opacity="0.5">
      <rect x="660" y="196" width="120" height="3"/><rect x="660" y="206" width="90" height="3"/>
      <rect x="820" y="196" width="120" height="3"/><rect x="820" y="206" width="70" height="3"/>
      <rect x="980" y="196" width="120" height="3"/><rect x="980" y="206" width="100" height="3"/>
    </g>
  </g>

  <!-- Logo emblem: RSS waves -->
  <g>
    <rect x="60" y="112" width="58" height="58" fill="url(#lg)"/>
    <rect x="60" y="112" width="58" height="58" fill="none" stroke="url(#title)" stroke-width="2"/>
    <rect x="60" y="112" width="58" height="3" fill="#ffa500"/>
    <g transform="translate(76,128)" stroke="#ffa500" stroke-width="2.6" fill="none">
      <path d="M0 28 a28 28 0 0 1 28 -28" transform="rotate(0)"/>
    </g>
    <g transform="translate(76,156)" stroke="#ffa500" stroke-width="2.6" fill="none">
      <path d="M0 0 a14 14 0 0 1 14 14"/><path d="M0 -12 a26 26 0 0 1 26 26"/>
      <circle cx="2" cy="11" r="3.5" fill="#ffa500" stroke="none"/>
    </g>
  </g>

  <text x="138" y="146" font-size="44" font-weight="800" fill="url(#title)" letter-spacing="-1">Onboard Feeder</text>
  <text x="140" y="182" font-size="17.5" fill="#b9b0a0">FastAPI feed collector — RSS ingestion, SQLite storage, signed webhook delivery</text>

  <g font-size="12.5" font-weight="600" font-family="JetBrains Mono, monospace">
    <rect x="140" y="204" width="100" height="28" fill="none" stroke="#3776ab" opacity="0.6"/>
    <text x="190" y="223" fill="#9ad8ff" text-anchor="middle">FASTAPI</text>
    <rect x="250" y="204" width="120" height="28" fill="none" stroke="#ffa500" opacity="0.6"/>
    <text x="310" y="223" fill="#ffce85" text-anchor="middle">RSS INGEST</text>
    <rect x="380" y="204" width="118" height="28" fill="none" stroke="#5aa0e0" opacity="0.6"/>
    <text x="439" y="223" fill="#9ad8ff" text-anchor="middle">WEBHOOKS</text>
  </g>
</svg>
